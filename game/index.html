<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice of Dionysus</title>
    <!-- Minimal fallback if external CSS blocked (e.g. file://) - avoid overriding normal screen switching -->
    <style>
        body{background:#1a3d38;color:#f0e6d2;margin:0;min-height:100vh}
        .hidden{display:none!important}
    </style>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/greek-theme.css">
    <link rel="stylesheet" href="css/balatro-effects.css">
    <link rel="stylesheet" href="css/juice-effects.css">
    <link rel="stylesheet" href="css/visual-tokens.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=IM+Fell+English+SC&family=VT323&display=swap" rel="stylesheet">
    <link rel="icon" href="ART/Title art.png" type="image/png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="appViewport" class="app-viewport">
        <div class="app-scale-wrap">
            <div class="app-stage">
                <!-- Start Screen (Balatro-style: bar below centre) -->
                <div id="startScreen">
                    <div class="modal-content start-screen-modal">
                        <div class="start-hero" aria-hidden="true">
                            <h1 class="start-hero-title">Dice of Dionysus</h1>
                            <p class="start-hero-sub">Cast fate. Court the gods. Build the pantheon.</p>
                            <span class="start-version-pill">v1.5.0 — Layout Overhaul</span>
                        </div>
                        <div class="main-menu-bar">
                            <div class="start-options">
                                <button class="divine-button" id="playButton">Play</button>
                                <button class="divine-button" id="continueButton" style="display: none;">Continue</button>
                                <button class="divine-button" id="collectionButton">Anthology</button>
                                <button class="divine-button" id="settingsButton" title="Options">Settings</button>
                                <input type="text" id="seedInput" placeholder="Enter Seed (optional)" class="seed-input-inline">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Collection Screen -->
                <div id="collectionScreen" class="hidden">
                    <div class="modal-content">
                        <div class="collection-header">
                            <h2 class="shop-title">Discovered Lore</h2>
                            <button class="divine-button" id="backToStartButton">Back</button>
                        </div>
                        <div class="collection-tabs">
                            <button class="divine-button active" data-tab="boons">Boons</button>
                            <button class="divine-button" data-tab="artifacts">Divine Artifacts</button>
                            <button class="divine-button" data-tab="worship">Worship Cards</button>
                            <button class="divine-button" data-tab="libations">Libations</button>
                        </div>
                        <div class="collection-pager" aria-label="Anthology page controls">
                            <button class="divine-button collection-page-btn" id="collectionPrevPageBtn" aria-label="Previous page">←</button>
                            <span class="collection-page-indicator" id="collectionPageIndicator">Page 1 / 1</span>
                            <button class="divine-button collection-page-btn" id="collectionNextPageBtn" aria-label="Next page">→</button>
                        </div>
                        <div class="collection-grid" id="boonsCollectionGrid"></div>
                        <div class="collection-grid hidden" id="artifactsCollectionGrid"></div>
                        <div class="collection-grid hidden" id="worshipCollectionGrid"></div>
                        <div class="collection-grid hidden" id="libationsCollectionGrid"></div>
                    </div>
                </div>

                <!-- Game (scaled with menu + collection via .app-stage) -->
                <div id="gameViewport" class="game-screen hidden">
                    <div class="game-container" id="gameContainerWrapper"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Game UI Template -->
    <template id="gameUITemplate">
        <!-- Game Border -->
        <div class="game-border"></div>

        <!-- Game Content Container -->
        <div class="game-content">
            <button class="divine-button return-to-menu-btn" id="returnToMenuBtn" title="Save and return to main menu">Menu</button>

            <!-- Main game area: pantheon top / consumables left / boons right / dice+gnosis centre -->
            <div class="main-game">

                <!-- 1. PANTHEON FRIEZE — full-width top strip, two tiers, no scores (suspended belief) -->
                <div class="pantheon-frieze" id="scorecard">
                    <div class="bonus-yahtzee-indicator" id="bonusYahtzeeIndicator" style="display: none;">
                        <span class="bonus-text">Bonus Heureka!</span>
                        <span class="bonus-count" id="bonusCount">0</span>
                    </div>
                    <!-- Upper tier: harder combo gods -->
                    <div class="pantheon-tier pantheon-tier-upper">
                        <div class="score-row pantheon-chip" data-category="Three of a Kind"><span>Three of a Kind (Hephaestus)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Four of a Kind"><span>Four of a Kind (Ares)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Full House"><span>Full House (Dionysus)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Small Straight"><span>Small Straight (Hermes)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Large Straight"><span>Large Straight (Apollo)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Yahtzee"><span>Heureka (Zeus)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Chance"><span>Chance (Nyx)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Pandora's Box"><span>Pandora's Box</span><div class="score-details"><span class="potential-score">-</span></div></div>
                    </div>
                    <!-- Lower tier: numeric gods -->
                    <div class="pantheon-tier pantheon-tier-lower">
                        <div class="score-row pantheon-chip" data-category="Ones"><span>Ones (Artemis)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Twos"><span>Twos (Aphrodite)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Threes"><span>Threes (Morpheus)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Fours"><span>Fours (Hera)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Fives"><span>Fives (Athena)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Sixes"><span>Sixes (Heracles)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Sevens" style="display: none;"><span>Sevens (The Pleiades)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Eights" style="display: none;"><span>Eights (Poseidon)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                        <div class="score-row pantheon-chip" data-category="Nines" style="display: none;"><span>Nines (The Nine Muses)</span><div class="score-details"><span class="potential-score">-</span></div></div>
                    </div>
                </div>

                <!-- 2. LEFT CONSUMABLE BAR — 5 slots vertical -->
                <div class="left-consumable-bar inventory-panel-consumables" id="leftConsumableBar">
                    <div class="consumable-slots card-area-squish card-area-vertical" id="consumableSlots"></div>
                    <span class="inventory-counter consumable-bar-counter" id="consumableSlotCounter">0/5</span>
                </div>

                <!-- 3. RIGHT BOON BAR — 5 slots vertical -->
                <div class="right-boon-bar inventory-panel-boons" id="rightBoonBar">
                    <div class="boon-slots card-area-squish card-area-vertical" id="boonSlots"></div>
                    <span class="inventory-counter boon-bar-counter" id="boonSlotCounter">0/5</span>
                    <span class="boon-reorder-hint" aria-hidden="true">Drag to gold to sell · onto another boon to reorder</span>
                </div>

                <!-- 4. CENTER GAME AREA — dice/shop stage swap + felt gnosis labels (siblings so they persist across stage swap) -->
                <div class="center-game-area">
                    <div class="game-board-bg" aria-hidden="true"></div>
                    <div class="dice-roll-zone" id="diceRollZone" aria-hidden="true"></div>

                    <!-- Drag zones (hidden until consumable-drag-active): worship → pantheon, libation → dice felt, sell → gold stone -->
                    <div class="consumable-zone consumable-zone-worship" id="consumableZoneWorship" aria-hidden="true"></div>
                    <div class="consumable-zone consumable-zone-libation" id="consumableZoneLibation" aria-hidden="true"></div>

                    <!-- Felt labels: threshold (top rim) + total (bottom rim). Hidden when .main-game.shop-active -->
                    <div class="felt-label felt-threshold" data-felt="threshold">
                        <span class="felt-label-name">Required</span>
                        <span class="felt-label-value" id="scoreThresholdDisplay">500</span>
                    </div>
                    <div class="felt-label felt-total" id="gnosisScorePanel" data-felt="total">
                        <span class="felt-label-name">Total</span>
                        <span class="felt-label-value" id="totalScore">0</span>
                    </div>

                    <!-- Live score: printed on felt, under the dice -->
                    <div id="liveScoreDisplay" class="live-score-display felt-live visible" data-live-root>
                        <span class="gnosis-category-name" data-live="category">Offering</span>
                        <div class="gnosis-cashout-content hidden" id="liveCashoutContent" aria-live="polite">
                            <span class="gnosis-cashout-line" id="liveCashoutLine"></span>
                        </div>
                        <div class="gnosis-row" data-live="row">
                            <span class="pips-cell live-metric-cell">
                                <span class="pips-line">
                                    <span class="pips" data-live="pips">0</span>
                                    <span class="live-add" data-live="pips-add" hidden><span class="plus-symbol">+</span><span class="pips pip-contribution" data-live="pips-contrib"></span></span>
                                </span>
                                <span class="gnosis-pips-bonus" data-live="pips-label">pips</span>
                            </span>
                            <span class="favour-cell live-metric-cell">
                                <span class="favour-line">
                                    <span class="favour" data-live="favour">0</span>
                                    <span class="live-add" data-live="favour-add" hidden><span class="plus-symbol">+</span><span class="favour favour-contribution" data-live="favour-contrib"></span></span>
                                </span>
                                <span class="gnosis-mult-bonus" data-live="favour-label">favour</span>
                            </span>
                        </div>
                        <div class="gnosis-row gnosis-row-na" data-live="row-na" hidden><span class="n-letter">N</span><span class="slash-symbol">/</span><span class="a-letter">A</span></div>
                    </div>

                    <!-- Stones: rolls / ante / gold / turn. Gold + ante persist in shop; rolls + turn hide. -->
                    <div class="felt-stone felt-stone-rolls" data-felt="rolls">
                        <span id="rollsLeft" class="rolls-left">Rolls: 3</span>
                    </div>
                    <div class="felt-stone felt-stone-ante" data-felt="ante">
                        <span class="felt-stone-label">Ante</span>
                        <span class="felt-stone-value" id="anteDisplay">1 / 8</span>
                    </div>
                    <div class="felt-stone felt-stone-gold" data-felt="gold" id="goldStone">
                        <span class="felt-stone-value" id="goldDisplay">0</span>
                        <span class="felt-stone-suffix">G</span>
                    </div>
                    <div class="felt-stone felt-stone-turn" data-felt="turn">
                        <span class="felt-stone-label">Turn</span>
                        <span class="felt-stone-value" id="turnDisplay">1</span>
                    </div>

                    <!-- ROUND: Play area (dice only; action button lives as a sibling below so it persists across stage swap) -->
                    <div id="playStage" class="game-stage">
                        <div class="play-stage-spacer"></div>
                        <div class="dice-container" id="diceContainer"></div>
                        <div class="play-stage-spacer"></div>
                    </div>

                    <!-- SHOP: Shop area replaces play area; Continue tucked in top-right corner -->
                    <div id="shopStage" class="game-stage hidden">
                        <button class="divine-button shop-continue-corner" id="shopContinueBtn" title="Continue to next round">Continue →</button>
                        <div class="shop-header">
                            <h2 class="shop-title"></h2>
                        </div>
                        <div id="shopDefaultView">
                            <div id="shopInventory" class="shop-drag-hint-banner">
                                <p class="shop-drag-hint-text"><strong>Packs</strong> — drag to <span class="hint-gold">Gold</span> to buy. <strong>Wares</strong> — drag to your <strong>Boon</strong> (right) or <strong>Libation</strong> (left) column. <strong>Artifacts</strong> — drag to <span class="hint-gold">Gold</span> to claim.</p>
                            </div>
                            <div class="shop-row shop-items" id="shopItemsRow">
                                <div class="shop-section" id="shopArtifactsArea"><h4>Divine Artifacts</h4></div>
                                <div class="shop-section" id="shopDirectSales"><h4>Wares</h4></div>
                            </div>
                            <div class="shop-row shop-packs" id="shopPacksRow">
                                <div class="shop-section" id="shopPacksArea"><h4>Packs</h4></div>
                            </div>
                        </div>
                        <div id="packOpeningView" class="hidden">
                            <p class="pack-open-drag-hint">Drag one card to your <strong>Boon</strong> (right) or <strong>Libation</strong> (left) column to claim.</p>
                            <div class="shop-main-area">
                                <div class="shop-section" id="packRevealedCards"><h4>Pack Contents</h4></div>
                                <div class="shop-section" id="packPlayerConsumables"><h4>Your Libations</h4></div>
                            </div>
                        </div>
                    </div>

                    <!-- Single action button: "Cast the Bones" in play / "Reroll" in shop. Cost badge is a sibling, not on the button. -->
                    <div class="rolling-controls" id="rollingControls">
                        <button id="rollButton" class="roll-button">Cast the Bones</button>
                        <span id="actionCostBadge" class="action-cost-badge hidden" aria-hidden="true">4g</span>
                    </div>

                    <div id="gnosisMessage" class="gnosis-message"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- Shop now lives in template shopStage (replaces rolling area per 6-translator) -->

    <div class="overlay hidden" id="confirmOverlay">
        <div class="modal-content confirmation-modal">
            <h3 id="confirmText" class="shop-title">Confirm Score?</h3>
            <p id="confirmDetails"></p>
            <div id="confirmActions">
                <button class="divine-button" id="confirmYes">✅ Yes</button>
                <button class="divine-button" id="confirmNo">❌ No</button>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="libationOverlay">
        <div class="modal-content libation-modal">
            <h2 class="shop-title">Libation to the Gods</h2>
            <p>Enhance all dice of a chosen face permanently.</p>
            <div class="enhancement-choice-grid" id="libationChoices"></div>
        </div>
    </div>

    <div class="overlay hidden" id="pantheonTotalOverlay">
        <div class="modal-content pantheon-total-modal">
            <div class="pantheon-overlay-content" id="pantheonOverlayContent">
                <h3 class="pantheon-total-title">Pantheon Total</h3>
                <div class="pantheon-total-value" id="pantheonTotalValue">0</div>
                <p class="pantheon-total-sub">— Off to the shop —</p>
            </div>
        </div>
    </div>

    <!-- Expulsion overlay (Balatro: No Space — choose one to sell to make room) -->
    <div class="overlay hidden" id="expulsionOverlay">
        <div class="modal-content expulsion-modal">
            <h3 class="shop-title" id="expulsionTitle">Make Room</h3>
            <p id="expulsionSubtitle">Tap a card to sell and make room:</p>
            <div class="expulsion-card-grid" id="expulsionCardGrid"></div>
            <button class="divine-button" id="expulsionCancelBtn">Cancel</button>
        </div>
    </div>

    <!-- Settings and pause overlays created dynamically (Balatro: G.FUNCS.overlay_menu) -->

    <!-- Scripts loaded in dependency order (defer = non-blocking parse, exec after DOM ready) -->
    <script defer src="js/utils/seededRNG.js"></script>
    <script defer src="js/utils/DieFaceUtils.js"></script>
    <script defer src="js/utils/NumberFormat.js"></script>
    <script defer src="js/utils/Logger.js"></script>
    <script defer src="js/utils/PlaytestRecorder.js"></script>
    <script defer src="js/utils/dataManager.js"></script>
    <script defer src="js/utils/DisplayScale.js"></script>
    <script defer src="js/utils/JuiceManager.js"></script>
    <script defer src="js/utils/ParticleSystem.js"></script>
    <script defer src="js/config/GameConstants.js"></script>
    <script defer src="js/config/ScoringConstants.js"></script>
    <script defer src="js/config/UIConstants.js"></script>
    <script defer src="js/config/BoonConstants.js"></script>
    <script defer src="js/data/assetMapping.js"></script>
    <script defer src="js/data/AnteData_js.js"></script>
    <script defer src="js/data/gameData.js"></script>
    <script defer src="js/classes/Die.js"></script>
    <script defer src="js/classes/Card.js"></script>
    <script defer src="js/classes/boonTimingHandlers.js"></script>
    <script defer src="js/classes/Boon.js"></script>
    <script defer src="js/classes/WorshipCard.js"></script>
    <script defer src="js/classes/LibationCard.js"></script>
    <script defer src="js/classes/Artifact.js"></script>
    <script defer src="js/engine/HandEvaluator.js"></script>
    <script defer src="js/engine/SafeMath.js"></script>
    <script defer src="js/engine/ScoringEngine.js"></script>
    <script defer src="js/engine/ShopStockGenerator.js"></script>
    <script defer src="js/engine/GameStateManager.js"></script>
    <script defer src="js/utils/GameTiming.js"></script>
    <script defer src="js/utils/AssetPreloader.js"></script>
    <script defer src="js/game/GameEngine.js"></script>
    <script defer src="js/ui/renderers/InfoBarRenderer.js"></script>
    <script defer src="js/ui/renderers/DiceRenderer.js"></script>
    <script defer src="js/ui/renderers/ScorecardRenderer.js"></script>
    <script defer src="js/ui/renderers/PlayAreaRenderer.js"></script>
    <script defer src="js/ui/ShopUI.js"></script>
    <script defer src="js/ui/UIManager.js"></script>
    <script defer src="js/ui/BalatroEffects.js"></script>
    <script defer src="js/ui/SoundManager.js"></script>
    <script defer src="js/ui/JuiceIntegration.js"></script>
    <script defer src="js/ui/SettingsOverlay.js"></script>
    <script defer src="js/ui/RunInfoOverlay.js"></script>
    <script defer src="js/Main.js"></script>

    <!-- Cash out feature removed as requested -->
</body>
</html>
