<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout lab — Dice of Dionysus</title>
    <link rel="stylesheet" href="css/layout-lab.css">
</head>
<body>
    <header class="layout-lab-chrome">
        <h1>Run shell silhouettes</h1>
        <p class="layout-lab-lead">Wireframe previews (1920×1080 design canvas). <strong>Shipped</strong> matches the playable layout; others are explorations. URL: <code>?shell=</code>.</p>
        <div class="layout-lab-toolbar">
            <label for="shellSelect">Shell</label>
            <select id="shellSelect" aria-label="Layout shell">
                <option value="shipped" selected>Shipped — in-game shell</option>
                <option value="legacy">Legacy — top bridge boons + consumables</option>
                <option value="A">A — Table rim (boons left arc)</option>
                <option value="A2">A2 — Table rim (boons right arc)</option>
                <option value="B">B — Hand below felt (compact boons)</option>
                <option value="B2">B2 — Hand below (wide boon rail)</option>
                <option value="C">C — Vertical lanes</option>
                <option value="D">D — Gnosis corners / split Pantheon</option>
                <option value="E">E — Two-state (compact vs commit)</option>
            </select>
        </div>
    </header>

    <section class="layout-lab-stage-wrap" aria-label="Scaled layout preview">
        <div class="layout-lab-scale-hint" id="scaleHint"></div>
        <div class="layout-lab-root" id="layoutRoot" data-shell="shipped">
            <div class="lab-main">
                <div class="lab-zone lab-gnosis" data-label="Gnosis"></div>
                <div class="lab-zone lab-artifacts" data-label="Artifacts"></div>
                <div class="lab-zone lab-center" data-label="Dice + shop stage"></div>
                <div class="lab-zone lab-pantheon-upper" data-label="Pantheon upper"></div>
                <div class="lab-zone lab-pantheon-lower" data-label="Pantheon lower"></div>
                <div class="lab-zone lab-boons" data-label="Boons (compact rail)"></div>
                <div class="lab-zone lab-consumables" data-label="Consumables dock"></div>
                <div class="lab-zone lab-zone-libation" data-label="Libation ← artifacts"></div>
                <div class="lab-zone lab-zone-worship" data-label="Worship → Pantheon"></div>
                <div class="lab-zone lab-zone-sell-l" data-label="Sell ← edge"></div>
                <div class="lab-zone lab-zone-sell-r" data-label="Sell → edge"></div>
            </div>
        </div>
    </section>

    <aside class="layout-lab-notes" id="notesPanel" aria-live="polite"></aside>

    <script>
(function () {
    const NOTES = {
        shipped: {
            title: 'Shipped — in-game shell',
            flow: 'Compact boon rail above the dice (same band as the old “prayer” preview). Center stage lowered so Cast the Bones clears. Consumables on a bottom horizon dock. Drag: Worship toward the right (Pantheon zone), Libation toward the left (Gnosis/artifacts), far screen edges to sell.',
            techniques: 'Directional drag + FX; Pantheon chunking unchanged; boons use compact “hand” scale.',
            pros: 'Thematic flow (offerings toward gods vs libation toward altar column); dice stay focal.',
            cons: 'Shorter shop/dice vertical pocket — tune if shop feels cramped.'
        },
        legacy: {
            title: 'Legacy — top bridge',
            flow: 'Older layout: boons + consumables shared one top bridge between columns. Center table started higher (260px).',
            techniques: 'Reference only; not in current build.',
            pros: 'Maximum vertical room for center stage.',
            cons: 'Balatro-like top strip; consumables not on a horizon dock. Faint cyan/tan zones here reflect an old top/bottom drag sketch — not the shipped left/right directions.'
        },
        A: {
            title: 'A — Table rim (boons left)',
            flow: 'Boons arc along the inner left rim of the table; consumables on bottom horizon; dice center; Pantheon outer right; Gnosis thin under table or bottom strip.',
            techniques: '1, 2, 6 — chunk Pantheon; emphasize rim cards by phase.',
            pros: 'Strong “offerings around the kylix” read; clears top bar.',
            cons: 'Arc hitboxes need care at scale; art burden.'
        },
        A2: {
            title: 'A2 — Table rim (boons right)',
            flow: 'Mirror of A: boons hug the table’s inner right edge; Pantheon can stay far right or narrow wedge.',
            techniques: 'Same as A; test dominant-hand / eye path.',
            pros: 'Balances composition if Pantheon is heavy on the right.',
            cons: 'Same as A.'
        },
        B: {
            title: 'B — Hand below felt (exploration)',
            flow: 'Original sketch: boon rail under dice. The shipped game instead puts compact boons above the lowered dice band (same “B” card scale, different Y).',
            techniques: 'Compare to Shipped for vertical tradeoffs.',
            pros: 'Keeps table lip visually clear of cards.',
            cons: 'Consumables + boons both below dice squeeze the roll button.'
        },
        B2: {
            title: 'B2 — Wide hand below (exploration)',
            flow: 'Wide boon rail under table + full-width consumable dock — not shipped; see Shipped for actual dock + side drag targets.',
            techniques: 'Use for “what if” spacing studies.',
            pros: 'Room for five large boon tiles.',
            cons: 'Heavy vertical consumption.'
        },
        C: {
            title: 'C — Vertical lanes',
            flow: 'Left: Gnosis + artifacts. Center: table. Right: twin tracks — inner boon/libation columns, outer Pantheon chunked.',
            techniques: '6 — upper/lower sanctum columns.',
            pros: 'Clear parallel scan; no top bridge.',
            cons: 'Right side very dense.'
        },
        D: {
            title: 'D — Corner Gnosis',
            flow: 'Objective / total / rolls as corner HUD; left column hosts large Pantheon upper; lower sanctum on right (or swapped).',
            techniques: '2, 6 — peripheral stats, focal scoring.',
            pros: 'Maximum Pantheon space; tactical clarity.',
            cons: 'Gnosis easy to fragment; needs discipline.'
        },
        E: {
            title: 'E — Two-state shell',
            flow: 'Roll phase: compact Pantheon strip + slim inventory. Score phase: Pantheon expands / slides; Gnosis breakdown opens.',
            techniques: '1 + 2 — progressive disclosure and emphasis.',
            pros: 'Low noise during rolls.',
            cons: 'More state to teach; animation cost.'
        }
    };

    const root = document.getElementById('layoutRoot');
    const select = document.getElementById('shellSelect');
    const notes = document.getElementById('notesPanel');
    const hint = document.getElementById('scaleHint');

    function params() {
        return new URLSearchParams(window.location.search);
    }

    function setShell(value) {
        let v = value === 'baseline' ? 'legacy' : value;
        if (!NOTES[v]) v = 'shipped';
        root.setAttribute('data-shell', v);
        select.value = v;
        const n = NOTES[v];
        notes.innerHTML = n
            ? `<h2>${n.title}</h2><p><strong>Flow:</strong> ${n.flow}</p><p><strong>Techniques (1,2,4,6):</strong> ${n.techniques}</p><p><strong>Pros:</strong> ${n.pros}</p><p><strong>Cons:</strong> ${n.cons}</p>`
            : '';
        const q = params();
        q.set('shell', v);
        const next = `${window.location.pathname}?${q.toString()}`;
        window.history.replaceState({}, '', next);
    }

    let initial = params().get('shell');
    if (initial === 'baseline') initial = 'legacy';
    if (initial && NOTES[initial]) select.value = initial;
    setShell(select.value);

    select.addEventListener('change', () => setShell(select.value));

    function updateScaleHint() {
        const w = root.offsetWidth;
        const scale = (w / 1920).toFixed(2);
        hint.textContent = `Canvas scaled to ${Math.round(w)}px wide (~${scale}× design).`;
    }
    window.addEventListener('resize', updateScaleHint);
    updateScaleHint();
})();
    </script>
</body>
</html>
