  </g>
  <!-- Corner blocks -->
  <rect x="0" y="0" width="12" height="12" fill="#6b4b30"/>
  <rect x="88" y="0" width="12" height="12" fill="#6b4b30"/>
  <rect x="88" y="88" width="12" height="12" fill="#6b4b30"/>
  <rect x="0" y="88" width="12" height="12" fill="#6b4b30"/>
