    <!-- Right edge: meander top-to-bottom -->
    <path d="M94,0 L94,10 L88,10 L88,16 L94,16 L94,22 L88,22 L88,28 L94,28 L94,34 L88,34 L88,40 L94,40 L94,46 L88,46 L88,52 L94,52 L94,58 L88,58 L88,64 L94,64 L94,70 L88,70 L88,76 L94,76 L94,82 L88,82 L88,100"/>
    <!-- Bottom edge: meander right-to-left -->
