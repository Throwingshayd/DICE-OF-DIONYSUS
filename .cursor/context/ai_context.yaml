# AI Context Metadata for Dice of Dionysus
# READ SOUL.md FIRST — this file extends it with module-level detail
# All agent context lives in .cursor/context/ (unified with cursor rules under .cursor/)

project:
  name: "Dice of Dionysus"
  version: "1.4.0"
  language: "JavaScript ES6+"
  framework: "Vanilla JS (no framework)"
  buildTool: "Vite"
  targetPlatforms: ["Web", "PWA", "Electron"]

# === ENTRY POINT ===
soul: "SOUL.md"  # Canonical agent orientation — read order, decision tree, strong opinions

# === AI LEARNING REFERENCES (.cursor/context/) ===
aiLearningFiles:
  primary: ".cursor/context/development_workflow.md"
  cardMetadata: ".cursor/context/CARD_METADATA_REFERENCE.md"
  boonReference: ".cursor/context/CONSOLIDATED_BOON_REFERENCE.md"
  designPrinciples: ".cursor/context/BALATRO_DESIGN_PRINCIPLES.md"
  definitiveMethods: ".cursor/context/definitive_methods_reference.md"
  performance: ".cursor/context/performance_notes.md"
  buttonAnalysis: ".cursor/context/BALATRO_BUTTON_ANALYSIS.md"
  godMetadata: ".cursor/context/GOD_METADATA_REFERENCE.md"
  architecture: ".cursor/context/ARCHITECTURE.md"
  systemMap: ".cursor/context/system_map.md"
  thisFile: ".cursor/context/ai_context.yaml"

# Maintenance workflow:
# - Card added/updated → Update CARD_METADATA_REFERENCE.md
# - Boon added/updated → Update CONSOLIDATED_BOON_REFERENCE.md
# - God metadata changed → Update GOD_METADATA_REFERENCE.md (.cursor/context/)
# - Shop/economy changed → Update development_workflow.md + BALATRO_DESIGN_PRINCIPLES.md
# - UI pattern added → Update BALATRO_DESIGN_PRINCIPLES.md
# - Bug fixed → Update development_workflow.md (bug fixes section)
# - Performance change → Update performance_notes.md
# PRIMARY: Use .cursor/rules/ (0-8) as the way forward. Cursor rules override scattered docs.

architecture:
  pattern: "Class-based OOP with separation of concerns"
  stateManagement: "Single source of truth in GameEngine.state"
  rendering: "DOM manipulation via UIManager"
  dataFlow: "Unidirectional (GameEngine → UIManager → DOM)"

performance:
  targets:
    fps: 60
    bundleSize: "~120KB"
    loadTime: "<2s"
    memoryFootprint: "Minimal allocations in game loop"
  hotPaths:
    - "GameEngine.rollDice()"
    - "GameEngine.calculateScore()"
    - "UIManager.renderDice()"
    - "UIManager.updateScorecard()"
  optimizationNotes: |
    - Profile before optimizing (use Chrome DevTools)
    - Cache where safe, but preserve determinism
    - Use seededRNG, never Math.random()
    - Minimize DOM manipulations in render loops

coreModules:
  gameEngine:
    file: "game/js/game/GameEngine.js"
    lines: 2020
    priority: critical
    dependencies: [seededRNG, dataManager, Die, Card classes]
    guidance: |
      Single source of truth for game state.
      All game logic flows through here.
      DO NOT split without explicit request.
      
  uiManager:
    file: "game/js/ui/UIManager.js"
    lines: ~330
    priority: high
    dependencies: [GameEngine, BalatroEffects, SoundManager, ShopUI]
    guidance: |
      Delegates shop to ShopUI. Shop logic (stock generation) in ShopStockGenerator.
      Focus on optimizing existing methods, not restructuring.
  shopUI:
    file: "game/js/ui/ShopUI.js"
    priority: high
    dependencies: [UIManager, ShopStockGenerator]
    guidance: |
      Renders shop, pack opening, expulsion. Uses ShopStockGenerator for pure stock logic.
  shopStockGenerator:
    file: "game/js/engine/ShopStockGenerator.js"
    priority: high
    dependencies: [CardData, GameConstants]
    guidance: |
      Pure logic: owned IDs, rarity, filters. No DOM. Input: gameState + prng. Output: stock data.

  displayScale:
    file: "game/js/utils/DisplayScale.js"
    priority: medium
    dependencies: [dataManager]
    guidance: |
      #appViewport letterboxed 1920×1080 stage (.app-stage transform). JS sets --app-scale only when
      settings use preset mult, max scale cap, or integer width snap; else CSS min(vw,w vh/h).
      Main.initialize → DisplayScale.init(); handleResize → refresh().

  cardSystem:
    files: ["game/js/classes/Card.js", "game/js/classes/Boon.js", "game/js/classes/WorshipCard.js", "game/js/classes/LibationCard.js", "game/js/classes/Artifact.js"]
    priority: high
    dependencies: [GameEngine]
    reference: ".cursor/context/CARD_METADATA_REFERENCE.md"
    guidance: |
      Inheritance hierarchy: Card → Boon/WorshipCard/LibationCard/Artifact
      4 card types: Boons, Worship, Libations, Artifacts
      Boons use timing-based effect system (before_score, after_score, etc.)
      All new cards start in gameData.js
      **When adding/updating cards: Update .cursor/context/CARD_METADATA_REFERENCE.md**
      **When adding/updating boons: Update .cursor/context/CONSOLIDATED_BOON_REFERENCE.md**
      
  dieSystem:
    file: "game/js/classes/Die.js"
    priority: high
    dependencies: []
    guidance: |
      Face-specific enhancement system (faces[1-6])
      Each face has value, enhancements Set, modifiedValue
      Enhancements: Parchment, Iron, Gold, Mirror, Wild, Mother of Pearl

gameMechanics:
  scoring:
    priority: critical
    dependencies: [ScoringConstants, worshipLevels, enhancements]
    reference: ".cursor/context/development_workflow.md (Scoring Formula section)"
    guidance: |
      Pips (base score) × Favour (multiplier) = Final Score
      Worship cards add +1 favour per category
      Enhancements modify pips (Iron: +5, etc.)
      Sequential animation shows calculation step-by-step
      
  progression:
    reference: ".cursor/context/development_workflow.md (Ante Progression section)"
    guidance: |
      13 turns per ante
      Score threshold increases each ante
      Boss blinds on certain antes
      Shop phase between turns
      
  economy:
    reference: ".cursor/context/BALATRO_DESIGN_PRINCIPLES.md (Economy System section)"
    guidance: |
      Starting gold: 6
      Shop reroll cost: 4 (1 free reroll per ante)
      Cards have cost and sellValue
      Gold earned from: scoring, card effects, enhancements
      **When changing economy: Update BALATRO_DESIGN_PRINCIPLES.md**

dataManagement:
  gameData:
    file: "game/js/data/gameData.js"
    purpose: "All card definitions, packs, artifacts"
    guidance: |
      Central registry for all game content
      New cards always start here
      **When adding cards: Update .cursor/context/CONSOLIDATED_BOON_REFERENCE.md**
      
  anteData:
    file: "game/js/data/AnteData_js.js"
    purpose: "Progression, thresholds, blinds"
    guidance: |
      Defines difficulty curve
      Boss blind mechanics
      
  constants:
    files: 
      - "game/js/config/GameConstants.js"
      - "game/js/config/ScoringConstants.js"
      - "game/js/config/UIConstants.js"
    purpose: "Game balance and configuration"
    guidance: |
      ALL magic numbers go here
      Never hardcode values in logic
      Easy balance tweaking
      **When changing constants: Update .cursor/context/development_workflow.md**

criticalPatterns:
  seededRNG:
    priority: critical
    reference: ".cursor/context/CONSOLIDATED_BOON_REFERENCE.md (Edge Case Protections)"
    guidance: |
      ALWAYS use this.prng.random() or this.prng.randomInt()
      NEVER use Math.random()
      Required for deterministic gameplay and testing
      **FIXED (Oct 16, 2025):** All gameplay Math.random() replaced with prng
      
  logging:
    priority: high
    guidance: |
      Use Logger.debug/info/warn/error, not console.log
      Logger auto-detects production mode
      Provides export/download functionality
      
  timing:
    priority: critical
    reference: ".cursor/context/CONSOLIDATED_BOON_REFERENCE.md (Timing System)"
    guidance: |
      Boon effects use timing system:
      - turn_start: ONLY in nextTurn(), never in executeRoll()
      - before_roll: Before dice roll
      - before_score: Before scoring calculation (main phase for bonuses)
      - after_score: After score confirmed
      - turn_end: End of turn
      - ante_end: End of ante
      **CRITICAL:** turn_start must be in nextTurn() AFTER setting default rolls
      
  cardEffects:
    priority: critical
    reference: ".cursor/context/CONSOLIDATED_BOON_REFERENCE.md (Implementation Patterns)"
    guidance: |
      New boon effects:
      1. Add to gameData.js with timing
      2. Implement in Boon.js applyTimingEffect() switch
      3. Test with deterministic seed
      4. Document in tracking/card_database.csv
      5. **Update .cursor/context/CONSOLIDATED_BOON_REFERENCE.md with new pattern**

terminology:
  enforced:
    boons: "Equipped passive cards (state.boons, type boon)"
    consumables: "Libations/Worship (internal: consumables)"
    pips: "Base score value"
    favour: "Score multiplier"
    ante: "Difficulty level"
    yahtzee: "Heureka (5-of-a-kind)"
  forbidden:
    - "houseRules" → use "libations"
    - "offerings" → use "libations"
    - "hands" → ask for thematic translation
    - "discards" → ask for thematic translation
  reasoning: |
    Greek mythology theming is core to game identity
    All terms must fit thematic context
    Always ask before introducing new mechanics/terms

debugging:
  consoleAccess:
    - "window.game → Current GameEngine instance"
    - "window.app → App instance"
    - "window.uiManager → UIManager instance"
    - "window.dataManager → DataManager instance"
  testingStrategy: |
    Use browser console, not separate test files
    Test with specific seeds for reproducibility
    Use Logger for tracing
    Reference tracking/BUGS_FIXED_LOG.md for past issues

technicalDebt:
  knownIssues:
    - "UIManager.js too large (1900 lines) - split deferred"
    - "Limited automated tests - 1 unit + 1 E2E; manual browser primary"
  futureConsiderations:
    - "Event system (pub/sub)"
    - "TypeScript migration (not now)"
    - "Formal state machine"
    - "Modding support"

aiInstructions:
  whenOptimizing:
    do:
      - "Profile first with Chrome DevTools"
      - "Focus on hot loops (rollDice, calculateScore, render)"
      - "Cache calculations where safe"
      - "Preserve deterministic behavior"
      - "Update .cursor/context/performance_notes.md if optimization pattern is reusable"
    dont:
      - "Add new dependencies"
      - "Change architecture without benchmarking"
      - "Optimize prematurely"
      - "Break seeded RNG"
      
  whenAdding:
    do:
      - "Follow Greek mythology theming"
      - "Use existing timing system"
      - "Add to gameData.js first"
      - "Implement in appropriate class"
      - "Test with seed"
      - "**Update .cursor/context/CONSOLIDATED_BOON_REFERENCE.md if adding boon**"
      - "**Update .cursor/context/BALATRO_DESIGN_PRINCIPLES.md if adding UI pattern**"
    dont:
      - "Create new card types without asking"
      - "Introduce new game mechanics without thematic names"
      - "Break existing card interactions"
      - "Forget to update .cursor/context/ learning files"
      
  whenFixing:
    do:
      - "Use Logger.error() to log"
      - "Check tracking/BUGS_FIXED_LOG.md"
      - "Test with deterministic seeds"
      - "Verify save/load compatibility"
      - "Update CHANGELOG.md"
      - "**Update .cursor/context/development_workflow.md if bug fix reveals pattern**"
    dont:
      - "Hide symptoms instead of fixing root cause"
      - "Break backwards save compatibility"
      - "Remove error handling to 'clean up'"
  
  whenUpdatingShop:
    do:
      - "Update .cursor/context/BALATRO_DESIGN_PRINCIPLES.md (Economy System)"
      - "Update .cursor/context/development_workflow.md if mechanics changed"
      - "Test economy balance thoroughly"
      - "Document in CHANGELOG.md"
    location: "game/js/engine/ShopStockGenerator.js (logic), game/js/ui/ShopUI.js (UI)"

behaviorExpectations:
  good:
    - "Suggest improvements, don't force them"
    - "Explain reasoning for changes"
    - "Respect existing architecture"
    - "Ask before introducing new concepts"
    - "Provide seeds for testing"
    - "Update .cursor/context/ files when adding game parameters/patterns"
  bad:
    - "Restructure codebase 'for best practices'"
    - "Add frameworks 'because modern'"
    - "Change working code 'to be cleaner'"
    - "Introduce terminology without theming"
    - "Break backwards compatibility"
    - "Add features without updating .cursor/context/ learning files"

philosophy: |
  See SOUL.md for identity and strong opinions.
  Stability > novelty. Performance > elegance. Simplicity > "best practices."
  Keep .cursor/context/ files updated when adding game parameters or patterns.

